name: Run Space Weather Alert

on:
  schedule:
    - cron: '*/30 13-20 * * *'
  workflow_dispatch:

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    env:
      TZ: Europe/Moscow
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Клонирование репозитория
        uses: actions/checkout@v4

      - name: Установка R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Установка системных библиотек
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libpng-dev

      - name: Установка pak
        run: |
          Rscript -e 'install.packages("pak", repos="https://cloud.r-project.org")'

      - name: Установка пакетов R
        run: |
          Rscript -e 'pak::pkg_install(c(
            "rlang",
            "ggplot2",
            "dplyr",
            "readr",
            "tidyr",
            "stringr",
            "purrr",
            "lubridate",
            "httr",
            "jsonlite",
            "sf",
            "terra",
            "ncdf4"
          ))'

      - name: Проверка пакетов
        run: |
          Rscript -e 'library(httr)'
          Rscript -e 'library(jsonlite)'
          Rscript -e 'library(ggplot2)'
          Rscript -e 'library(dplyr)'
          Rscript -e 'library(readr)'
          Rscript -e 'library(tidyr)'
          Rscript -e 'library(stringr)'
          Rscript -e 'library(purrr)'
          Rscript -e 'library(lubridate)'
          Rscript -e 'library(sf)'
          Rscript -e 'library(terra)'
          Rscript -e 'library(ncdf4)'
          Rscript -e 'print("Все пакеты успешно загружены!")'

      - name: Запуск главного скрипта
        run: |
          Rscript scripts/main.R
